upstream chat-servers {
    ip_hash;
    server chat-server-1:8080 max_fails=3 fail_timeout=30s;
    server chat-server-2:8080 max_fails=3 fail_timeout=30s;
}

upstream api-server {
    server api-server:8081 max_fails=3 fail_timeout=30s;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    client_max_body_size 10m;

    # ─── 업로드 파일 중 HTML/JS 서빙 차단 (XSS 방지) ───
    location ~* ^/uploads/.*\.(?:html?|js|svg)$ {
        return 403;
    }

    # ─── 업로드 파일 정적 서빙 (Docker shared volume) ───
    location /uploads/ {
        alias /data/uploads/;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # ─── WebSocket (STOMP) → chat-server 로드밸런싱 ───
    location /ws {
        proxy_pass http://chat-servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /ws-stomp {
        proxy_pass http://chat-servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── 메시지 조회 API → api-server (MongoDB 읽기 전용) ───
    # api-server 엔드포인트: GET /api/rooms/{roomId}/messages
    location /api/rooms/ {
        proxy_pass http://api-server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── REST API → chat-server 로드밸런싱 ───
    location /api/ {
        proxy_pass http://chat-servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 크로스 인스턴스 디버깅/검증용 upstream 식별 헤더
        add_header X-Upstream-Server $upstream_addr always;
    }

    # ─── 기타 요청 → chat-server ───
    location / {
        proxy_pass http://chat-servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
