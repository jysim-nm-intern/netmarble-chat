upstream chat-servers {
    server chat-server-1:8080 max_fails=3 fail_timeout=30s;
    server chat-server-2:8080 max_fails=3 fail_timeout=30s;
}

upstream api-server {
    server api-server:8081 max_fails=3 fail_timeout=30s;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # ─── WebSocket (STOMP) → chat-server 로드밸런싱 ───
    location /ws {
        proxy_pass http://chat-servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /ws-stomp {
        proxy_pass http://chat-servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── 메시지 조회 API → api-server (MongoDB 읽기 전용) ───
    # api-server 엔드포인트: GET /api/rooms/{roomId}/messages
    location /api/rooms/ {
        proxy_pass http://api-server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── REST API → chat-server 로드밸런싱 ───
    location /api/ {
        proxy_pass http://chat-servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── 기타 요청 → chat-server ───
    location / {
        proxy_pass http://chat-servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
