name: Server Tests

on:
  push:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'chat-server/src/**'
      - 'chat-server/build.gradle'
      - 'chat-server/settings.gradle'
      - 'chat-server/gradle/**'
      - 'server/src/**'
      - 'server/build.gradle'
      - 'server/settings.gradle'
      - 'server/gradle/**'
  pull_request:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'chat-server/src/**'
      - 'chat-server/build.gradle'
      - 'chat-server/settings.gradle'
      - 'chat-server/gradle/**'
      - 'server/src/**'
      - 'server/build.gradle'
      - 'server/settings.gradle'
      - 'server/gradle/**'

jobs:
  # ─── 단위 테스트 (H2 인메모리, @Tag("integration") 제외) ─────────────────────
  unit-test:
    name: Spring Boot 단위 테스트
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # chat-server/ 우선, 없으면 server/ fallback
      - name: 서버 디렉토리 결정
        id: server-dir
        run: |
          if [ -f "chat-server/build.gradle" ]; then
            echo "dir=chat-server" >> $GITHUB_OUTPUT
          else
            echo "dir=server" >> $GITHUB_OUTPUT
          fi

      - name: Gradle 실행 권한 부여
        run: chmod +x ./${{ steps.server-dir.outputs.dir }}/gradlew

      - name: 단위 테스트 실행
        working-directory: ${{ steps.server-dir.outputs.dir }}
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: JaCoCo 커버리지 리포트 생성
        working-directory: ${{ steps.server-dir.outputs.dir }}
        run: ./gradlew jacocoTestReport --no-daemon
        continue-on-error: true

      - name: 테스트 결과 파일 확인
        id: check-unit-tests
        if: always()
        run: |
          SERVER_DIR="${{ steps.server-dir.outputs.dir }}"
          if ls ${SERVER_DIR}/build/test-results/test/*.xml 2>/dev/null | head -1 | grep -q .; then
            echo "has-tests=true" >> $GITHUB_OUTPUT
          else
            echo "has-tests=false" >> $GITHUB_OUTPUT
          fi

      - name: 테스트 결과 PR 체크에 기록
        uses: dorny/test-reporter@v1
        if: always() && steps.check-unit-tests.outputs.has-tests == 'true'
        with:
          name: Server Unit Tests
          path: ${{ steps.server-dir.outputs.dir }}/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: JaCoCo 커버리지 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: ${{ steps.server-dir.outputs.dir }}/build/reports/jacoco/
          retention-days: 7

  # ─── 통합 테스트 (MySQL 서비스 컨테이너 사용) ─────────────────────────────────
  integration-test:
    name: Spring Boot 통합 테스트 (MySQL)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: chat_test
          MYSQL_USER: chatuser
          MYSQL_PASSWORD: chatpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 서버 디렉토리 결정
        id: server-dir
        run: |
          if [ -f "chat-server/build.gradle" ]; then
            echo "dir=chat-server" >> $GITHUB_OUTPUT
          else
            echo "dir=server" >> $GITHUB_OUTPUT
          fi

      - name: Gradle 실행 권한 부여
        run: chmod +x ./${{ steps.server-dir.outputs.dir }}/gradlew

      - name: 통합 테스트 실행 (MySQL 연동)
        working-directory: ${{ steps.server-dir.outputs.dir }}
        run: ./gradlew integrationTest --no-daemon
        continue-on-error: true
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/chat_test
          SPRING_DATASOURCE_USERNAME: chatuser
          SPRING_DATASOURCE_PASSWORD: chatpass
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      - name: 통합 테스트 결과 파일 확인
        id: check-integration-tests
        if: always()
        run: |
          SERVER_DIR="${{ steps.server-dir.outputs.dir }}"
          if ls ${SERVER_DIR}/build/test-results/integrationTest/*.xml 2>/dev/null | head -1 | grep -q .; then
            echo "has-tests=true" >> $GITHUB_OUTPUT
          else
            echo "has-tests=false" >> $GITHUB_OUTPUT
          fi

      - name: 통합 테스트 결과 PR 체크에 기록
        uses: dorny/test-reporter@v1
        if: always() && steps.check-integration-tests.outputs.has-tests == 'true'
        with:
          name: Server Integration Tests
          path: ${{ steps.server-dir.outputs.dir }}/build/test-results/integrationTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: 통합 테스트 결과 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-integration-test-results
          path: ${{ steps.server-dir.outputs.dir }}/build/test-results/integrationTest/
          retention-days: 7
