name: Server Tests

on:
  push:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'chat-server/src/**'
      - 'chat-server/package.json'
      - 'chat-server/tsconfig.json'
  pull_request:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'chat-server/src/**'
      - 'chat-server/package.json'
      - 'chat-server/tsconfig.json'

jobs:
  # ─── 단위 테스트 (Jest, 외부 인프라 불필요) ─────────────────────────────────
  unit-test:
    name: NestJS 단위 테스트
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    defaults:
      run:
        working-directory: chat-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chat-server/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 단위 테스트 실행
        run: npm test -- --coverage --ci
        continue-on-error: true

      - name: 커버리지 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-report
          path: chat-server/coverage/
          retention-days: 7

  # ─── 통합 테스트 (MySQL 서비스 컨테이너 사용) ─────────────────────────────────
  integration-test:
    name: NestJS 통합 테스트 (MySQL)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    defaults:
      run:
        working-directory: chat-server

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: chat_test
          MYSQL_USER: chatuser
          MYSQL_PASSWORD: chatpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chat-server/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 통합 테스트 실행 (MySQL 연동)
        run: npm run test:e2e -- --ci
        continue-on-error: true
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: chat_test
          DB_USERNAME: chatuser
          DB_PASSWORD: chatpass
