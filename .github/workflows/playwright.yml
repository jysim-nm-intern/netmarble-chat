name: Playwright Tests
on:
  push:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'client/src/components/**'
      - 'client/src/api/**'
      - 'client/tests/**'
      - 'client/package*.json'
      - 'client/playwright.config.*'
      - 'client/vite.config.*'
  pull_request:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'client/src/components/**'
      - 'client/src/api/**'
      - 'client/tests/**'
      - 'client/package*.json'
      - 'client/playwright.config.*'
      - 'client/vite.config.*'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ── Node.js 설정 ──────────────────────────────────────────
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
        cache-dependency-path: |
          client/package-lock.json
          chat-server/package-lock.json

    # ── NestJS 백엔드 기동 (SQLite 인메모리) ──────────────────
    - name: chat-server 의존성 설치
      working-directory: chat-server
      run: npm ci

    - name: chat-server 빌드
      working-directory: chat-server
      run: npm run build

    - name: NestJS 백엔드 시작 (백그라운드)
      working-directory: chat-server
      run: nohup node dist/main.js > /tmp/backend.log 2>&1 &
      env:
        NODE_ENV: test
        PORT: 8080
        DB_HOST: localhost
        DB_PORT: 3306
        DB_USERNAME: root
        DB_PASSWORD: root
        DB_NAME: test

    - name: 백엔드 시작 대기 (최대 5분)
      run: |
        for i in $(seq 1 150); do
          if curl -s http://localhost:8080/api/health > /dev/null 2>&1; then
            echo "백엔드 시작 완료"
            exit 0
          fi
          echo "대기 중... ($i/150)"
          sleep 2
        done
        echo "백엔드 시작 타임아웃 - 로그:"
        cat /tmp/backend.log
        exit 1

    # ── 프론트엔드 ──────────────────────────────────────────
    - name: 프론트엔드 의존성 설치
      working-directory: client
      run: npm ci

    - name: Playwright 브라우저 설치
      working-directory: client
      run: npx playwright install --with-deps

    # ── E2E 테스트 실행 ────────────────────────────────────────────
    - name: Playwright E2E 테스트 실행
      working-directory: client
      run: npx playwright test
      continue-on-error: true

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: client/playwright-report/
        retention-days: 30
