name: Playwright Tests
on:
  push:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'client/src/components/**'
      - 'client/src/api/**'
      - 'client/tests/**'
      - 'client/package*.json'
      - 'client/playwright.config.*'
      - 'client/vite.config.*'
  pull_request:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'client/src/components/**'
      - 'client/src/api/**'
      - 'client/tests/**'
      - 'client/package*.json'
      - 'client/playwright.config.*'
      - 'client/vite.config.*'
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4

    - name: chat-server 디렉토리 존재 확인
      id: check-backend
      run: |
        if [ -d "server/chat-server/src" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "::notice::chat-server 디렉토리가 존재하지 않아 E2E 테스트를 건너뜁니다"
        fi

    # ── Node.js 설정 ──────────────────────────────────────────
    - uses: actions/setup-node@v4
      if: steps.check-backend.outputs.exists == 'true'
      with:
        node-version: lts/*
        cache: npm
        cache-dependency-path: |
          client/package-lock.json
          server/chat-server/package-lock.json

    # ── NestJS 백엔드 기동 (MySQL 서비스 컨테이너) ──────────────────
    - name: chat-server 의존성 설치
      if: steps.check-backend.outputs.exists == 'true'
      working-directory: server/chat-server
      run: npm ci

    - name: chat-server 빌드
      if: steps.check-backend.outputs.exists == 'true'
      working-directory: server/chat-server
      run: npm run build

    - name: NestJS 백엔드 시작 (백그라운드)
      if: steps.check-backend.outputs.exists == 'true'
      working-directory: server/chat-server
      run: nohup node dist/main.js > /tmp/backend.log 2>&1 &
      env:
        NODE_ENV: test
        PORT: 8080
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_USERNAME: root
        DB_PASSWORD: root
        DB_NAME: test
        TYPEORM_SYNC: 'true'

    - name: 백엔드 시작 대기 (최대 5분)
      if: steps.check-backend.outputs.exists == 'true'
      run: |
        for i in $(seq 1 150); do
          if curl -s http://localhost:8080/api/health > /dev/null 2>&1; then
            echo "백엔드 시작 완료"
            exit 0
          fi
          echo "대기 중... ($i/150)"
          sleep 2
        done
        echo "백엔드 시작 타임아웃 - 로그:"
        cat /tmp/backend.log
        exit 1

    # ── 프론트엔드 ──────────────────────────────────────────
    - name: 프론트엔드 의존성 설치
      if: steps.check-backend.outputs.exists == 'true'
      working-directory: client
      run: npm ci

    - name: Playwright 브라우저 설치
      if: steps.check-backend.outputs.exists == 'true'
      working-directory: client
      run: npx playwright install --with-deps

    # ── E2E 테스트 실행 ────────────────────────────────────────────
    - name: Playwright E2E 테스트 실행
      if: steps.check-backend.outputs.exists == 'true'
      working-directory: client
      run: npx playwright test
      continue-on-error: true

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() && steps.check-backend.outputs.exists == 'true' }}
      with:
        name: playwright-report
        path: client/playwright-report/
        retention-days: 30
