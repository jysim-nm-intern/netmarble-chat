name: API Server Tests

on:
  push:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'server/api-server/src/**'
      - 'server/api-server/package.json'
      - 'server/api-server/tsconfig.json'
  pull_request:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'server/api-server/src/**'
      - 'server/api-server/package.json'
      - 'server/api-server/tsconfig.json'

jobs:
  # ─── 단위 테스트 (Jest, 외부 인프라 불필요) ──────────────────────────────────
  unit-test:
    name: API Server 단위 테스트
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    defaults:
      run:
        working-directory: server/api-server

    steps:
      - uses: actions/checkout@v4

      - name: api-server 디렉토리 존재 확인
        id: check-dir
        run: |
          if [ -d "server/api-server/src" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::server/api-server 디렉토리가 존재하지 않아 테스트를 건너뜁니다"
          fi
        working-directory: .

      - uses: actions/setup-node@v4
        if: steps.check-dir.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/api-server/package-lock.json

      - name: 의존성 설치
        if: steps.check-dir.outputs.exists == 'true'
        run: npm ci

      - name: 단위 테스트 실행
        if: steps.check-dir.outputs.exists == 'true'
        run: npm test -- --coverage --ci
        continue-on-error: true

      - name: 커버리지 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always() && steps.check-dir.outputs.exists == 'true'
        with:
          name: api-server-coverage-report
          path: server/api-server/coverage/
          retention-days: 7

  # ─── 통합 테스트 (MongoDB 서비스 컨테이너) ────────────────────────────────────
  integration-test:
    name: API Server 통합 테스트 (MongoDB)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    defaults:
      run:
        working-directory: server/api-server

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: api-server 디렉토리 존재 확인
        id: check-dir
        run: |
          if [ -d "server/api-server/src" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::api-server 디렉토리가 존재하지 않아 테스트를 건너뜁니다"
          fi
        working-directory: .

      - uses: actions/setup-node@v4
        if: steps.check-dir.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/api-server/package-lock.json

      - name: 의존성 설치
        if: steps.check-dir.outputs.exists == 'true'
        run: npm ci

      - name: 통합 테스트 실행 (MongoDB 연동)
        if: steps.check-dir.outputs.exists == 'true'
        run: npm run test:e2e -- --ci
        continue-on-error: true
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/netmarble_chat_test
