name: API Server Tests

on:
  push:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'api-server/src/**'
      - 'api-server/package.json'
      - 'api-server/tsconfig.json'
  pull_request:
    branches: [ main, master, phase-*, 'copilot/**' ]
    paths:
      - 'api-server/src/**'
      - 'api-server/package.json'
      - 'api-server/tsconfig.json'

jobs:
  # ─── 단위 테스트 (Jest, 외부 인프라 불필요) ──────────────────────────────────
  unit-test:
    name: API Server 단위 테스트
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    defaults:
      run:
        working-directory: api-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-server/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 단위 테스트 실행
        run: npm test -- --coverage --ci
        continue-on-error: true

      - name: 커버리지 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-server-coverage-report
          path: api-server/coverage/
          retention-days: 7

  # ─── 통합 테스트 (MongoDB 서비스 컨테이너) ────────────────────────────────────
  integration-test:
    name: API Server 통합 테스트 (MongoDB)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    defaults:
      run:
        working-directory: api-server

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-server/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 통합 테스트 실행 (MongoDB 연동)
        run: npm run test:e2e -- --ci
        continue-on-error: true
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/netmarble_chat_test
