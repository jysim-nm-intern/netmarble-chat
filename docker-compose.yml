services:

  # ─────────────────────────────────────────────
  # 데이터베이스
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: netmarble-chat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: netmarble_chat
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./chat-server/src/main/resources/schema-mysql.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: netmarble-chat-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: netmarble-chat-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # chat-server (STOMP/WebSocket + MySQL + MongoDB 쓰기)
  # ─────────────────────────────────────────────
  server:
    build:
      context: ./chat-server
      dockerfile: Dockerfile
    container_name: netmarble-chat-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MONGODB_URI: mongodb://mongodb:27017/netmarble_chat
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    volumes:
      - ./server.log:/app/server.log
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # api-server (REST API + MongoDB 읽기 + MySQL 조회)
  # ─────────────────────────────────────────────
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: netmarble-chat-api-server
    environment:
      MONGODB_URI: mongodb://mongodb:27017/netmarble_chat
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # 프론트엔드 클라이언트 1 (포트 3000)
  # ─────────────────────────────────────────────
  client-3000:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: netmarble-chat-client-3000
    environment:
      VITE_PORT: "3000"
      VITE_API_TARGET: "http://server:8080"
      VITE_WS_TARGET: "ws://server:8080"
    ports:
      - "3000:3000"
    depends_on:
      - server

  # ─────────────────────────────────────────────
  # 프론트엔드 클라이언트 2 (포트 3001)
  # ─────────────────────────────────────────────
  client-3001:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: netmarble-chat-client-3001
    environment:
      VITE_PORT: "3001"
      VITE_API_TARGET: "http://server:8080"
      VITE_WS_TARGET: "ws://server:8080"
    ports:
      - "3001:3001"
    depends_on:
      - server

  # ─────────────────────────────────────────────
  # 테스트 서비스 (profile: test)
  # ─────────────────────────────────────────────
  server-test:
    build:
      context: ./chat-server
      dockerfile: Dockerfile
      target: builder
    profiles: ["test"]
    working_dir: /app
    environment:
      SPRING_PROFILES_ACTIVE: ""
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/netmarble_chat_test?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_H2_CONSOLE_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
    command: ["./gradlew", "test", "--no-daemon"]

  client-test:
    build:
      context: ./client
      dockerfile: Dockerfile
    profiles: ["test"]
    command: ["npm", "test"]

  # ─────────────────────────────────────────────
  # 부하테스트 서버 (profile: load)
  # ─────────────────────────────────────────────
  server-load:
    build:
      context: ./chat-server
      dockerfile: Dockerfile
    container_name: netmarble-chat-server-load
    profiles: ["load"]
    environment:
      SPRING_PROFILES_ACTIVE: load
      JAVA_OPTS: "-Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MONGODB_URI: mongodb://mongodb:27017/netmarble_chat
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2.5G
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  mysql_data:
  mongo_data:
