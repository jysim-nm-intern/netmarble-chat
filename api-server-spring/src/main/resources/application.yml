spring:
  application:
    name: netmarble-chat-api-server

  # MongoDB — 메시지 이력 조회, cursor-based 페이징
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/netmarble_chat}

  jackson:
    time-zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8081}

logging:
  level:
    org.springframework.web: INFO
    com.netmarble.chat: DEBUG

---
# 개발 프로파일 (EmbeddedMongo)
spring:
  config:
    activate:
      on-profile: dev
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/netmarble_chat_dev}
